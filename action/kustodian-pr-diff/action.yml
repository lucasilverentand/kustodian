name: 'Kustodian PR Diff'
description: 'Run a live `kustodian diff` against configured clusters and post the result as a PR comment'
author: 'Luca Silverentand'

branding:
  icon: 'git-pull-request'
  color: 'blue'

inputs:
  github-token:
    description: 'GitHub token for PR comments'
    required: true
  kubeconfig:
    description: 'Base64-encoded kubeconfig with access to every cluster you want to diff'
    required: true
  cluster:
    description: 'Filter to a specific cluster name (defaults to all clusters in the project)'
    required: false
    default: ''
  project-path:
    description: 'Path to kustodian project root'
    required: false
    default: '.'
  kustodian-version:
    description: 'Kustodian version to install (e.g., "1.9.0" or "latest")'
    required: false
    default: 'latest'
  flux-version:
    description: 'Flux CLI version to install (e.g., "2.3.0" or "latest")'
    required: false
    default: 'latest'

outputs:
  has-changes:
    description: 'Whether any cluster would change ("true" or "false")'
    value: ${{ steps.diff.outputs.has-changes }}

runs:
  using: 'composite'
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2

    - name: Install kustodian
      shell: bash
      run: |
        bun install -g kustodian@${{ inputs.kustodian-version }}
        GLOBAL_BIN="$(bun pm bin -g)"
        echo "$GLOBAL_BIN" >> "$GITHUB_PATH"
        # bun global shims use #!/usr/bin/env node — symlink bun as node
        ln -sf "$(which bun)" "$GLOBAL_BIN/node"

    - name: Install project dependencies
      shell: bash
      working-directory: ${{ inputs.project-path }}
      run: |
        if [ -f "package.json" ]; then
          bun install --frozen-lockfile 2>/dev/null || bun install
        fi

    - name: Setup plugin dependencies
      shell: bash
      continue-on-error: true
      run: bun run "${{ github.action_path }}/run-plugin-setup.ts" "${{ inputs.project-path }}"

    - name: Install kubectl
      shell: bash
      run: |
        if ! command -v kubectl >/dev/null 2>&1; then
          KUBECTL_VERSION="$(curl -Ls https://dl.k8s.io/release/stable.txt)"
          curl -sLo kubectl "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/
        fi
        kubectl version --client=true

    - name: Install Flux CLI
      shell: bash
      env:
        FLUX_VERSION: ${{ inputs.flux-version }}
      run: |
        if [ "$FLUX_VERSION" = "latest" ]; then
          curl -s https://fluxcd.io/install.sh | sudo bash
        else
          curl -s https://fluxcd.io/install.sh | sudo FLUX_VERSION="$FLUX_VERSION" bash
        fi
        flux --version

    - name: Configure kubeconfig
      shell: bash
      run: |
        mkdir -p "$HOME/.kube"
        echo "${{ inputs.kubeconfig }}" | base64 -d > "$HOME/.kube/config"
        chmod 600 "$HOME/.kube/config"

    - name: Run cluster diff
      id: diff
      shell: bash
      working-directory: ${{ inputs.project-path }}
      env:
        KUBECONFIG: ${{ env.HOME }}/.kube/config
      run: |
        ARGS=("diff" "--format" "markdown" "--kubeconfig" "$HOME/.kube/config")
        if [ -n "${{ inputs.cluster }}" ]; then
          ARGS+=("--cluster" "${{ inputs.cluster }}")
        fi

        # `diff` exits 0 for no changes, 1 for changes, non-zero otherwise. We
        # want to keep running so we can post the comment regardless.
        set +e
        kustodian "${ARGS[@]}" > /tmp/kustodian-pr-comment.md 2> /tmp/kustodian-pr-progress.log
        exit_code=$?
        set -e

        # Always show progress in the workflow logs.
        cat /tmp/kustodian-pr-progress.log || true

        case "$exit_code" in
          0) echo "has-changes=false" >> "$GITHUB_OUTPUT" ;;
          1) echo "has-changes=true"  >> "$GITHUB_OUTPUT" ;;
          *)
            echo "has-changes=true" >> "$GITHUB_OUTPUT"
            echo "::warning::kustodian diff exited with code $exit_code — posting whatever output was produced"
            ;;
        esac

    - name: Cleanup kubeconfig
      if: always()
      shell: bash
      run: rm -f "$HOME/.kube/config"

    - name: Comment on PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const fs = require('fs');
          const marker = '<!-- kustodian-pr-diff -->';
          const legacyMarker = '<!-- kustodian-manifest-diff -->';

          let body = '';
          try {
            body = fs.readFileSync('/tmp/kustodian-pr-comment.md', 'utf-8');
          } catch {
            body = marker + '\n### Kustodian PR Diff\n\n_Diff step did not produce output — see the workflow logs for details._';
          }

          if (!body.includes(marker)) {
            body = marker + '\n' + body;
          }

          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });

          const existing = comments.find(
            (c) => c.body?.includes(marker) || c.body?.includes(legacyMarker),
          );

          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
          }

    - name: Cleanup
      if: always()
      shell: bash
      run: rm -f /tmp/kustodian-pr-comment.md /tmp/kustodian-pr-progress.log
