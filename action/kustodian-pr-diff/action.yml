name: 'Kustodian PR Diff'
description: 'Post a Kustodian live-cluster diff and source-file review on pull requests'
author: 'Luca Silverentand'

branding:
  icon: 'git-pull-request'
  color: 'blue'

inputs:
  github-token:
    description: 'GitHub token for PR comments and artifact uploads'
    required: true
  cluster:
    description: 'Cluster name to diff against the live cluster (must match a folder under clusters/)'
    required: false
    default: ''
  project-path:
    description: 'Path to kustodian project root'
    required: false
    default: '.'
  kustodian-version:
    description: 'Kustodian version to install (e.g., "1.9.0" or "latest")'
    required: false
    default: 'latest'
  retention-days:
    description: 'Number of days to retain the HTML diff report artifact'
    required: false
    default: '30'
  kubeconfig:
    description: 'Base64-encoded kubeconfig for live cluster diff. When omitted, the comment will mark the cluster as "not analyzed".'
    required: false
    default: ''

outputs:
  has-changes:
    description: 'Whether changes were detected (live or source)'
    value: ${{ steps.diff.outputs.has-changes }}
  artifact-url:
    description: 'URL to the HTML source-file review artifact'
    value: ${{ steps.upload-html.outputs.artifact-url }}

runs:
  using: 'composite'
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2

    - name: Install kustodian
      shell: bash
      run: |
        bun install -g kustodian@${{ inputs.kustodian-version }}
        GLOBAL_BIN="$(bun pm bin -g)"
        echo "$GLOBAL_BIN" >> "$GITHUB_PATH"
        # bun global shims use #!/usr/bin/env node — symlink bun as node
        ln -sf "$(which bun)" "$GLOBAL_BIN/node"

    - name: Install project dependencies
      shell: bash
      working-directory: ${{ inputs.project-path }}
      run: |
        if [ -f "package.json" ]; then
          bun install --frozen-lockfile 2>/dev/null || bun install
        fi

    - name: Setup plugin dependencies
      shell: bash
      continue-on-error: true
      run: bun run "${{ github.action_path }}/run-plugin-setup.ts" "${{ inputs.project-path }}"

    - name: Discover project clusters
      id: clusters
      shell: bash
      working-directory: ${{ inputs.project-path }}
      run: |
        # Each subdirectory of clusters/ that contains a cluster.yaml is a cluster.
        names=()
        if [ -d clusters ]; then
          for dir in clusters/*/; do
            name="$(basename "$dir")"
            if [ -f "clusters/${name}/cluster.yaml" ]; then
              names+=("$name")
            fi
          done
        fi
        joined="$(IFS=, ; echo "${names[*]}")"
        echo "all=${joined}" >> "$GITHUB_OUTPUT"
        echo "Discovered clusters: ${joined:-<none>}"

    - name: Generate PR manifests
      shell: bash
      working-directory: ${{ inputs.project-path }}
      run: |
        mkdir -p /tmp/kustodian-manifests-pr
        ARGS=("-o" "/tmp/kustodian-manifests-pr")
        if [ -n "${{ inputs.cluster }}" ]; then
          ARGS+=("-c" "${{ inputs.cluster }}")
        fi
        kustodian preview "${ARGS[@]}"

    - name: Fetch base branch
      shell: bash
      run: git fetch origin "${{ github.event.pull_request.base.ref }}" --depth=1

    - name: Create base worktree
      shell: bash
      run: git worktree add /tmp/kustodian-base "origin/${{ github.event.pull_request.base.ref }}" --detach

    - name: Install base dependencies
      shell: bash
      working-directory: /tmp/kustodian-base/${{ inputs.project-path }}
      run: |
        if [ -f "package.json" ]; then
          bun install --frozen-lockfile 2>/dev/null || bun install
        fi

    - name: Generate base manifests
      shell: bash
      working-directory: /tmp/kustodian-base/${{ inputs.project-path }}
      run: |
        mkdir -p /tmp/kustodian-manifests-base
        ARGS=("-o" "/tmp/kustodian-manifests-base")
        if [ -n "${{ inputs.cluster }}" ]; then
          ARGS+=("-c" "${{ inputs.cluster }}")
        fi
        kustodian preview "${ARGS[@]}" 2>/dev/null || true

    - name: Setup live diff tools
      if: inputs.kubeconfig != ''
      shell: bash
      run: |
        if ! command -v kubectl &>/dev/null; then
          curl -sLO "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/
        fi
        if ! command -v flux &>/dev/null; then
          curl -s https://fluxcd.io/install.sh | sudo bash
        fi

    - name: Configure kubeconfig
      if: inputs.kubeconfig != ''
      shell: bash
      run: |
        mkdir -p ~/.kube
        echo "${{ inputs.kubeconfig }}" | base64 -d > ~/.kube/config
        chmod 600 ~/.kube/config

    - name: Run live cluster diff
      id: live-diff
      if: inputs.kubeconfig != '' && inputs.cluster != ''
      shell: bash
      continue-on-error: true
      working-directory: ${{ inputs.project-path }}
      run: |
        ARGS=("diff")
        ARGS+=("--kubeconfig" "$HOME/.kube/config")
        ARGS+=("--cluster" "${{ inputs.cluster }}")
        ARGS+=("--json" "/tmp/kustodian-live-diff.json")

        # Capture text output for fallback rendering and human readability.
        kustodian "${ARGS[@]}" 2>&1 | tee /tmp/kustodian-live-diff.txt

    - name: Generate diff report
      id: diff
      shell: bash
      run: |
        ARGS=("--mode" "ci")
        ARGS+=("/tmp/kustodian-manifests-base")
        ARGS+=("/tmp/kustodian-manifests-pr")
        ARGS+=("/tmp/kustodian-diff-report/index.html")
        ARGS+=("/tmp/kustodian-diff-summary.json")
        ARGS+=("/tmp/kustodian-comment.md")

        if [ -n "${{ inputs.cluster }}" ]; then
          ARGS+=("--cluster" "${{ inputs.cluster }}")
        fi

        if [ -n "${{ steps.clusters.outputs.all }}" ]; then
          ARGS+=("--all-clusters" "${{ steps.clusters.outputs.all }}")
        fi

        if [ -n "${{ inputs.cluster }}" ] && [ -n "${{ inputs.kubeconfig }}" ]; then
          ARGS+=("--analyzed-clusters" "${{ inputs.cluster }}")
        fi

        ARGS+=("--repo-pr" "${{ github.workspace }}/${{ inputs.project-path }}")
        ARGS+=("--repo-base" "/tmp/kustodian-base/${{ inputs.project-path }}")

        if [ -s "/tmp/kustodian-live-diff.json" ]; then
          ARGS+=("--live-json" "/tmp/kustodian-live-diff.json")
        fi
        if [ -s "/tmp/kustodian-live-diff.txt" ]; then
          ARGS+=("--live-diff" "/tmp/kustodian-live-diff.txt")
        fi

        bun run "${{ github.action_path }}/generate-diff.ts" "${ARGS[@]}"

        HAS_CHANGES=$(jq -r 'if (.total > 0) or (.live.has_changes // false) then "true" else "false" end' /tmp/kustodian-diff-summary.json)
        echo "has-changes=$HAS_CHANGES" >> "$GITHUB_OUTPUT"

    - name: Cleanup kubeconfig
      if: always() && inputs.kubeconfig != ''
      shell: bash
      run: rm -f ~/.kube/config

    - name: Upload HTML report
      if: steps.diff.outputs.has-changes == 'true'
      id: upload-html
      continue-on-error: true
      uses: actions/upload-artifact@v4
      with:
        name: kustodian-pr-diff-report
        path: /tmp/kustodian-diff-report/
        retention-days: ${{ inputs.retention-days }}

    - name: Comment on PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const fs = require('fs');
          const marker = '<!-- kustodian-pr-diff -->';
          const legacyMarker = '<!-- kustodian-manifest-diff -->';

          let body = marker + '\n';
          body += fs.readFileSync('/tmp/kustodian-comment.md', 'utf-8');

          const hasChanges = '${{ steps.diff.outputs.has-changes }}' === 'true';
          const artifactUrl = '${{ steps.upload-html.outputs.artifact-url }}';
          if (hasChanges && artifactUrl) {
            body += '\n\n' + `📄 [Open the source-file review HTML artifact](${artifactUrl})`;
          }

          body += '\n\n---\n<sub>Generated by <a href="https://github.com/lucasilverentand/kustodian">Kustodian</a></sub>';

          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });

          const existing = comments.find(c => c.body?.includes(marker) || c.body?.includes(legacyMarker));

          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
          }

    - name: Cleanup
      if: always()
      shell: bash
      run: |
        git worktree remove /tmp/kustodian-base --force 2>/dev/null || true
        rm -rf /tmp/kustodian-manifests-base /tmp/kustodian-manifests-pr 2>/dev/null || true
        rm -rf /tmp/kustodian-diff-report /tmp/kustodian-diff-summary.json /tmp/kustodian-comment.md /tmp/kustodian-live-diff.txt /tmp/kustodian-live-diff.json 2>/dev/null || true
