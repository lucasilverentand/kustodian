apiVersion: apps/v1
kind: Deployment
metadata:
  name: example-git-web-app
  namespace: example-git-web-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: example-git-web-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: example-git-web-app
    spec:
      containers:
        - name: web
          image: nginx:1.27-alpine
          ports:
            - name: http
              containerPort: 80
          envFrom:
            - configMapRef:
                name: example-git-web-app-config
